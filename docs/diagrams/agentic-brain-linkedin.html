<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loomind — Agentic Brain</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 24px;
    font-family: 'Inter', sans-serif;
  }
  svg { display: block; }

  .flow-dash {
    stroke-dasharray: 8 6;
    animation: dash-flow 1.2s linear infinite;
  }
  @keyframes dash-flow {
    to { stroke-dashoffset: -28; }
  }
  .flow-dash-rev {
    stroke-dasharray: 8 6;
    animation: dash-flow-rev 1.2s linear infinite;
  }
  @keyframes dash-flow-rev {
    to { stroke-dashoffset: 28; }
  }
  .pulse-dot {
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.3; r: 3; }
    50% { opacity: 1; r: 5; }
  }
</style>
</head>
<body>

<svg viewBox="0 0 1160 860" width="1160" height="860" xmlns="http://www.w3.org/2000/svg">

  <!-- ══════════ DEFS ══════════ -->
  <defs>
    <marker id="a-purple" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#6366f1"/>
    </marker>
    <marker id="a-green" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#10b981"/>
    </marker>
    <marker id="a-amber" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#f59e0b"/>
    </marker>
    <marker id="a-pink" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#ec4899"/>
    </marker>
    <marker id="a-slate" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#94a3b8"/>
    </marker>
    <marker id="a-blue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#3b82f6"/>
    </marker>

    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- ══════════ HEADER ══════════ -->
  <text x="580" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#6366f1" letter-spacing="2">LOOMIND STUDIO</text>
  <text x="580" y="72" text-anchor="middle" font-size="30" font-weight="800" fill="#0f172a">Agentic Brain — Self-Learning Loop</text>
  <text x="580" y="98" text-anchor="middle" font-size="13" fill="#64748b">Goals flow in, tasks flow out, CLI agents execute autonomously. The system learns from every outcome.</text>


  <!-- ══════════ CONNECTION LINES ══════════ -->

  <!-- Goal -> BA -->
  <line x1="550" y1="160" x2="550" y2="188" stroke="#6366f1" stroke-width="2" class="flow-dash" marker-end="url(#a-purple)"/>

  <!-- BA -> Queue -->
  <line x1="550" y1="240" x2="550" y2="268" stroke="#6366f1" stroke-width="2" class="flow-dash" marker-end="url(#a-purple)"/>

  <!-- Queue -> Pipeline center -->
  <line x1="500" y1="320" x2="500" y2="375" stroke="#6366f1" stroke-width="2" class="flow-dash" marker-end="url(#a-purple)"/>
  <circle cx="500" cy="350" r="4" fill="#6366f1" class="pulse-dot"/>

  <!-- Queue -> Fleet (right) -->
  <path d="M670,295 L820,295 L820,355" stroke="#6366f1" stroke-width="1.5" fill="none" class="flow-dash" marker-end="url(#a-purple)"/>
  <text x="745" y="288" text-anchor="middle" font-size="9" fill="#6366f1" font-weight="600">SSE push</text>

  <!-- HITL -> Research -->
  <path d="M230,355 L230,400 L300,400" stroke="#f59e0b" stroke-width="1.5" fill="none" class="flow-dash" marker-end="url(#a-amber)"/>
  <text x="218" y="380" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="600">gate</text>

  <!-- Pipeline arrows: R->C, C->T, T->E -->
  <line x1="380" y1="400" x2="420" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a-slate)"/>
  <line x1="520" y1="400" x2="560" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a-slate)"/>
  <line x1="660" y1="400" x2="700" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a-slate)"/>

  <!-- Fleet -> Evaluate (claim/exec) -->
  <path d="M820,420 L770,420" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#a-purple)"/>
  <text x="830" y="445" text-anchor="start" font-size="9" fill="#6366f1" font-weight="600">claim / exec</text>

  <!-- Evaluate -> PASS -->
  <path d="M720,420 L580,475" stroke="#10b981" stroke-width="2" fill="none" class="flow-dash" marker-end="url(#a-green)"/>

  <!-- Evaluate -> REVISION -->
  <path d="M750,420 L750,475" stroke="#f59e0b" stroke-width="2" fill="none" class="flow-dash" marker-end="url(#a-amber)"/>

  <!-- REVISION -> Code (loop back — clean curve right then up) -->
  <path d="M800,495 L840,495 L840,380 L520,380" stroke="#f59e0b" stroke-width="1.5" fill="none" class="flow-dash-rev" marker-end="url(#a-amber)"/>
  <text x="855" y="440" font-size="9" fill="#f59e0b" font-weight="600">retry</text>

  <!-- PASS -> Upvote -->
  <line x1="510" y1="510" x2="420" y2="560" stroke="#10b981" stroke-width="1.5" class="flow-dash" marker-end="url(#a-green)"/>

  <!-- PASS -> Save -->
  <line x1="560" y1="510" x2="560" y2="560" stroke="#10b981" stroke-width="1.5" class="flow-dash" marker-end="url(#a-green)"/>

  <!-- REVISION -> Downvote -->
  <line x1="750" y1="515" x2="750" y2="560" stroke="#ec4899" stroke-width="1.5" class="flow-dash" marker-end="url(#a-pink)"/>

  <!-- Upvote -> Engine -->
  <line x1="380" y1="610" x2="440" y2="660" stroke="#10b981" stroke-width="1.5" class="flow-dash" marker-end="url(#a-green)"/>
  <!-- Save -> Engine -->
  <line x1="560" y1="610" x2="540" y2="660" stroke="#10b981" stroke-width="1.5" class="flow-dash" marker-end="url(#a-green)"/>
  <!-- Downvote -> Engine -->
  <path d="M730,610 Q680,640 620,660" stroke="#ec4899" stroke-width="1.5" fill="none" class="flow-dash" marker-end="url(#a-pink)"/>

  <!-- Engine -> Intercept (big feedback loop left) -->
  <path d="M420,695 Q140,750 175,500" stroke="#ec4899" stroke-width="2" fill="none" class="flow-dash-rev"/>
  <circle cx="220" cy="670" r="4" fill="#ec4899" class="pulse-dot"/>
  <text x="148" y="620" text-anchor="middle" font-size="9" fill="#ec4899" font-weight="600" transform="rotate(-72,148,620)">smarter next time</text>

  <!-- Intercept -> Research -->
  <line x1="230" y1="455" x2="310" y2="395" stroke="#10b981" stroke-width="1.5" class="flow-dash" marker-end="url(#a-green)"/>
  <text x="248" y="415" font-size="9" fill="#10b981" font-weight="600">suggestions</text>

  <!-- Affinity -> Fleet -->
  <line x1="960" y1="550" x2="960" y2="430" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a-blue)"/>
  <text x="960" y="495" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="600">routing</text>

  <!-- Outcome -> Affinity -->
  <path d="M810,500 Q890,530 930,550" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#a-blue)"/>


  <!-- ══════════ NODES ══════════ -->

  <!-- GOAL -->
  <g filter="url(#shadow)">
    <rect x="460" y="120" width="180" height="40" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
    <line x1="460" y1="123" x2="640" y2="123" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <text x="550" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Goal Submitted</text>
    <text x="550" y="155" text-anchor="middle" font-size="10" fill="#94a3b8">Human or API</text>
  </g>

  <!-- BA AGENT -->
  <g filter="url(#shadow)">
    <rect x="430" y="193" width="240" height="45" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
    <line x1="430" y1="196" x2="670" y2="196" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <text x="550" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">BA Agent</text>
    <text x="550" y="231" text-anchor="middle" font-size="10" fill="#94a3b8">LLM decomposes into Stories + Story Points</text>
  </g>

  <!-- TASK QUEUE -->
  <g filter="url(#shadow)">
    <rect x="400" y="273" width="270" height="45" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <line x1="400" y1="276" x2="670" y2="276" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <text x="535" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Priority Task Queue</text>
    <text x="535" y="311" text-anchor="middle" font-size="10" fill="#94a3b8">SQLite WAL — survives restarts</text>
  </g>

  <!-- HITL GATE -->
  <g filter="url(#shadow)">
    <rect x="148" y="275" width="160" height="75" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <line x1="148" y1="278" x2="308" y2="278" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    <text x="228" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">HITL Gate</text>
    <text x="228" y="316" text-anchor="middle" font-size="9" fill="#94a3b8">SECURITY and DELETE</text>
    <text x="228" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">require human approval</text>
    <text x="228" y="344" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="600">180s timeout</text>
  </g>

  <!-- ── PIPELINE ── -->
  <g filter="url(#shadow)">
    <rect x="300" y="380" width="80" height="40" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="340" y="398" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Research</text>
    <text x="340" y="412" text-anchor="middle" font-size="9" fill="#94a3b8">Grok</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="425" y="380" width="95" height="40" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="473" y="398" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Code</text>
    <text x="473" y="412" text-anchor="middle" font-size="9" fill="#94a3b8">Claude</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="565" y="380" width="95" height="40" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="613" y="398" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Test</text>
    <text x="613" y="412" text-anchor="middle" font-size="9" fill="#94a3b8">Codex</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="705" y="380" width="95" height="40" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="753" y="398" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Evaluate</text>
    <text x="753" y="412" text-anchor="middle" font-size="9" fill="#94a3b8">AGY</text>
  </g>
  <text x="540" y="438" text-anchor="middle" font-size="9" fill="#64748b" font-weight="600" letter-spacing="1">AUTONOMOUS PIPELINE</text>

  <!-- FLEET -->
  <g filter="url(#shadow)">
    <rect x="830" y="355" width="180" height="75" rx="12" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="920" y="377" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">CLI Fleet</text>
    <text x="875" y="397" text-anchor="middle" font-size="10" fill="#64748b">Claude</text>
    <text x="965" y="397" text-anchor="middle" font-size="10" fill="#64748b">Grok</text>
    <text x="875" y="417" text-anchor="middle" font-size="10" fill="#64748b">Codex</text>
    <text x="965" y="417" text-anchor="middle" font-size="10" fill="#64748b">AGY</text>
    <circle cx="853" cy="394" r="3" fill="#6366f1"/>
    <circle cx="943" cy="394" r="3" fill="#f59e0b"/>
    <circle cx="853" cy="414" r="3" fill="#10b981"/>
    <circle cx="943" cy="414" r="3" fill="#ec4899"/>
  </g>

  <!-- PASS -->
  <g filter="url(#shadow)">
    <rect x="480" y="478" width="120" height="35" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="540" y="497" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">PASS</text>
    <text x="540" y="508" text-anchor="middle" font-size="9" fill="#4ade80">goal complete</text>
  </g>

  <!-- NEEDS REVISION -->
  <g filter="url(#shadow)">
    <rect x="680" y="478" width="150" height="35" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
    <text x="755" y="497" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">NEEDS REVISION</text>
    <text x="755" y="508" text-anchor="middle" font-size="9" fill="#fbbf24">max 3 cycles</text>
  </g>

  <!-- UPVOTE -->
  <g filter="url(#shadow)">
    <rect x="290" y="565" width="180" height="45" rx="10" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <line x1="290" y1="568" x2="470" y2="568" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <text x="380" y="586" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Upvote Experiences</text>
    <text x="380" y="602" text-anchor="middle" font-size="9" fill="#94a3b8">Promote T3 &gt; T2 &gt; T1 &gt; T0</text>
  </g>

  <!-- SAVE SOLUTION -->
  <g filter="url(#shadow)">
    <rect x="490" y="565" width="175" height="45" rx="10" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <line x1="490" y1="568" x2="665" y2="568" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <text x="578" y="586" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Auto-Save Solution</text>
    <text x="578" y="602" text-anchor="middle" font-size="9" fill="#94a3b8">Verified code as new experience</text>
  </g>

  <!-- DOWNVOTE -->
  <g filter="url(#shadow)">
    <rect x="685" y="565" width="190" height="45" rx="10" fill="#fff" stroke="#ec4899" stroke-width="2"/>
    <line x1="685" y1="568" x2="875" y2="568" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
    <text x="780" y="586" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Downvote Experiences</text>
    <text x="780" y="602" text-anchor="middle" font-size="9" fill="#94a3b8">Demote failed advice</text>
  </g>

  <!-- EXPERIENCE ENGINE -->
  <g filter="url(#shadow)">
    <rect x="370" y="660" width="290" height="55" rx="12" fill="#fff" stroke="#6366f1" stroke-width="2"/>
    <line x1="370" y1="663" x2="660" y2="663" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <text x="515" y="683" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Experience Engine</text>
    <text x="515" y="700" text-anchor="middle" font-size="10" fill="#94a3b8">Qdrant vector store — T0 Principles to T3 Observations</text>
  </g>

  <!-- INTERCEPT LAYER -->
  <g filter="url(#shadow)">
    <rect x="140" y="458" width="170" height="52" rx="10" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <line x1="140" y1="461" x2="310" y2="461" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <text x="225" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Intercept Layer</text>
    <text x="225" y="496" text-anchor="middle" font-size="9" fill="#94a3b8">L1 Filter &gt; L2 Semantic &gt; L3 LLM</text>
  </g>

  <!-- DYNAMIC AFFINITY -->
  <g filter="url(#shadow)">
    <rect x="895" y="550" width="185" height="50" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <line x1="895" y1="553" x2="1080" y2="553" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <text x="988" y="573" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Dynamic Affinity</text>
    <text x="988" y="589" text-anchor="middle" font-size="9" fill="#94a3b8">Laplace-smoothed success scores per CLI</text>
  </g>


  <!-- ══════════ LEGEND ══════════ -->
  <g transform="translate(140,770)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#6366f1" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="30" y="4" font-size="10" fill="#64748b" font-weight="500">Execution flow</text>

    <line x1="150" y1="0" x2="174" y2="0" stroke="#10b981" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="180" y="4" font-size="10" fill="#64748b" font-weight="500">Learning signal</text>

    <line x1="300" y1="0" x2="324" y2="0" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="330" y="4" font-size="10" fill="#64748b" font-weight="500">Revision loop</text>

    <line x1="440" y1="0" x2="464" y2="0" stroke="#ec4899" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="470" y="4" font-size="10" fill="#64748b" font-weight="500">Feedback to knowledge</text>
  </g>

  <!-- ══════════ STATS ══════════ -->
  <g transform="translate(755,760)">
    <text x="0" y="0" font-size="20" font-weight="800" fill="#0f172a">4</text>
    <text x="0" y="14" font-size="9" fill="#94a3b8" font-weight="600" letter-spacing="0.5">CLI AGENTS</text>

    <text x="90" y="0" font-size="20" font-weight="800" fill="#0f172a">15</text>
    <text x="90" y="14" font-size="9" fill="#94a3b8" font-weight="600" letter-spacing="0.5">MCP TOOLS</text>

    <text x="180" y="0" font-size="20" font-weight="800" fill="#0f172a">180s</text>
    <text x="180" y="14" font-size="9" fill="#94a3b8" font-weight="600" letter-spacing="0.5">HITL TIMEOUT</text>

    <text x="290" y="0" font-size="20" font-weight="800" fill="#0f172a">4</text>
    <text x="290" y="14" font-size="9" fill="#94a3b8" font-weight="600" letter-spacing="0.5">TIERS</text>
  </g>

  <!-- watermark -->
  <text x="580" y="830" text-anchor="middle" font-size="10" fill="#cbd5e1">github.com/KhaiTrang1995/loomind-studio</text>

</svg>

</body>
</html>
