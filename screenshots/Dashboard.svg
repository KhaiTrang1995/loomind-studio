<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#bgGradient)"/>

  <!-- Header -->
  <rect width="1400" height="80" fill="rgba(17,24,39,0.5)" opacity="0.8"/>
  <line x1="0" y1="80" x2="1400" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Logo -->
  <rect x="30" y="26" width="28" height="28" rx="6" fill="#3b82f6"/>
  <text x="44" y="44" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="white">LM</text>
  <text x="70" y="44" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">Loomind Studio</text>

  <!-- Navigation -->
  <text x="700" y="45" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#3b82f6">Dashboard</text>
  <text x="820" y="45" font-family="Inter,sans-serif" font-size="12" fill="#94a3b8">Goals</text>
  <text x="900" y="45" font-family="Inter,sans-serif" font-size="12" fill="#94a3b8">Fleet</text>
  <text x="980" y="45" font-family="Inter,sans-serif" font-size="12" fill="#94a3b8">Experiences</text>
  <text x="1120" y="45" font-family="Inter,sans-serif" font-size="12" fill="#94a3b8">Monitor</text>

  <!-- Main Content Grid -->

  <!-- Card 1: System Metrics (Top Left) -->
  <rect x="30" y="110" width="660" height="350" rx="12" fill="rgba(17,24,39,0.75)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="50" y="140" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#cbd5e1">🎯 System Metrics</text>

  <!-- Metric boxes -->
  <g id="metric">
    <rect x="50" y="160" width="140" height="100" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
    <text x="120" y="200" font-family="Inter,sans-serif" font-size="28" font-weight="700" fill="#3b82f6" text-anchor="middle">12</text>
    <text x="120" y="235" font-family="Inter,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Total Goals</text>
  </g>

  <g id="metric2">
    <rect x="210" y="160" width="140" height="100" rx="8" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="280" y="200" font-family="Inter,sans-serif" font-size="28" font-weight="700" fill="#10b981" text-anchor="middle">48</text>
    <text x="280" y="235" font-family="Inter,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Tasks Done</text>
  </g>

  <g id="metric3">
    <rect x="370" y="160" width="140" height="100" rx="8" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
    <text x="440" y="200" font-family="Inter,sans-serif" font-size="28" font-weight="700" fill="#8b5cf6" text-anchor="middle">94%</text>
    <text x="440" y="235" font-family="Inter,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Success Rate</text>
  </g>

  <g id="metric4">
    <rect x="530" y="160" width="140" height="100" rx="8" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
    <text x="600" y="200" font-family="Inter,sans-serif" font-size="28" font-weight="700" fill="#06b6d4" text-anchor="middle">2.3s</text>
    <text x="600" y="235" font-family="Inter,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Avg Latency</text>
  </g>

  <!-- Task List -->
  <text x="50" y="300" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Recent Tasks</text>

  <g id="task1">
    <rect x="50" y="315" width="600" height="40" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="60" y="340" font-family="Inter,sans-serif" font-size="12" fill="#cbd5e1">API Refactor • Code</text>
    <rect x="570" y="323" width="60" height="24" rx="4" fill="rgba(59,130,246,0.3)"/>
    <text x="600" y="339" font-family="Inter,sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">Running</text>
  </g>

  <g id="task2">
    <rect x="50" y="365" width="600" height="40" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="60" y="390" font-family="Inter,sans-serif" font-size="12" fill="#cbd5e1">Bug Fix • Test</text>
    <rect x="570" y="373" width="60" height="24" rx="4" fill="rgba(100,116,139,0.3)"/>
    <text x="600" y="389" font-family="Inter,sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">Pending</text>
  </g>

  <!-- Card 2: Fleet Status (Top Right) -->
  <rect x="710" y="110" width="660" height="350" rx="12" fill="rgba(17,24,39,0.75)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="730" y="140" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#cbd5e1">🚀 Agent Fleet Status</text>

  <!-- Agent Cards -->
  <g id="agent1">
    <rect x="730" y="160" width="145" height="130" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="807" y="185" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Claude</text>
    <circle cx="810" cy="205" r="4" fill="#10b981"/>
    <text x="830" y="209" font-family="Inter,sans-serif" font-size="11" fill="#34d399">Online</text>
    <text x="807" y="240" font-family="Inter,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">3 tasks • 98%</text>
  </g>

  <g id="agent2">
    <rect x="895" y="160" width="145" height="130" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="967" y="185" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">AGY</text>
    <circle cx="970" cy="205" r="4" fill="#10b981"/>
    <text x="990" y="209" font-family="Inter,sans-serif" font-size="11" fill="#34d399">Online</text>
    <text x="967" y="240" font-family="Inter,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">2 tasks • 95%</text>
  </g>

  <g id="agent3">
    <rect x="1060" y="160" width="145" height="130" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="1132" y="185" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Grok</text>
    <circle cx="1135" cy="205" r="4" fill="#10b981"/>
    <text x="1155" y="209" font-family="Inter,sans-serif" font-size="11" fill="#34d399">Online</text>
    <text x="1132" y="240" font-family="Inter,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">1 task • 92%</text>
  </g>

  <!-- Experience Learning Section -->
  <rect x="30" y="480" width="1340" height="370" rx="12" fill="rgba(17,24,39,0.75)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="50" y="510" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#cbd5e1">🧠 Experience Learning Pipeline</text>

  <!-- Pipeline visualization -->
  <g id="pipeline">
    <!-- L1 -->
    <rect x="70" y="540" width="120" height="80" rx="8" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="2"/>
    <text x="130" y="565" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#34d399" text-anchor="middle">L1 Filter</text>
    <text x="130" y="585" font-family="Inter,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">&lt;1ms</text>
    <text x="130" y="605" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Keyword</text>

    <!-- Arrow -->
    <line x1="190" y1="580" x2="230" y2="580" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <polygon points="240,580 230,575 230,585" fill="rgba(255,255,255,0.2)"/>

    <!-- L2 -->
    <rect x="250" y="540" width="120" height="80" rx="8" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="2"/>
    <text x="310" y="565" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">L2 Search</text>
    <text x="310" y="585" font-family="Inter,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">&lt;50ms</text>
    <text x="310" y="605" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Qdrant</text>

    <!-- Arrow -->
    <line x1="370" y1="580" x2="410" y2="580" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <polygon points="420,580 410,575 410,585" fill="rgba(255,255,255,0.2)"/>

    <!-- L3 -->
    <rect x="430" y="540" width="120" height="80" rx="8" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="2"/>
    <text x="490" y="565" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">L3 Synthesize</text>
    <text x="490" y="585" font-family="Inter,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">&lt;500ms</text>
    <text x="490" y="605" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Ollama LLM</text>

    <!-- Arrow -->
    <line x1="550" y1="580" x2="590" y2="580" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <polygon points="600,580 590,575 590,585" fill="rgba(255,255,255,0.2)"/>

    <!-- Output -->
    <rect x="610" y="540" width="120" height="80" rx="8" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="2"/>
    <text x="670" y="565" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">Suggestions</text>
    <text x="670" y="585" font-family="Inter,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Ranked</text>
    <text x="670" y="605" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Results</text>
  </g>

  <!-- Stats at bottom -->
  <g id="stats">
    <text x="50" y="670" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">📊 Experience Stats</text>

    <rect x="50" y="690" width="200" height="80" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="150" y="715" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#3b82f6" text-anchor="middle">1,847</text>
    <text x="150" y="755" font-family="Inter,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Total Experiences</text>

    <rect x="270" y="690" width="200" height="80" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="370" y="715" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#10b981" text-anchor="middle">342</text>
    <text x="370" y="755" font-family="Inter,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">T0 Principles</text>

    <rect x="490" y="690" width="200" height="80" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="590" y="715" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#8b5cf6" text-anchor="middle">1,505</text>
    <text x="590" y="755" font-family="Inter,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Indexed (T1-T3)</text>

    <rect x="710" y="690" width="200" height="80" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="810" y="715" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#06b6d4" text-anchor="middle">87%</text>
    <text x="810" y="755" font-family="Inter,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Upvote Rate</text>
  </g>

  <!-- Footer -->
  <text x="700" y="850" font-family="Inter,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Real-time updates via SSE • Phase 11 Agentic Brain • Powered by FastAPI + React</text>
</svg>
